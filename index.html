<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tailwind CSS Practice</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen relative">
  <header class="sm:h-12 h-11">
    <nav class="sm:h-12 h-11 shadow-lg flex justify-evenly items-center bg-blue-400">
      <h1 class="font-bold text-lg sm:text-xl ml-2">
        Epicman
      </h1>
      <div class="sm:relative sm:w-72 flex justify-center items-center gap-2">
        <input class="outline-none border-none sm:absolute focus:outline-none rounded-sm border border-black w-32 sm:w-52 self-center
      p-1 sm:px-2 h-5 text-sm sm:h-7 sm:focus:w-56 sm:transition-width sm:duration-250 sm:ease-in-out
      " type="search" name="query" id="search-btn"
      placeholder="Search the site">
        <button class="inline-flex items-center sm:absolute sm:right-0">
          <span class="material-icons">
            search
          </span>
        </button>
      </div>
      <button class="inline-flex items-center sm:hidden" id="hamburger" hamburgerState="closed">
        <span class="material-icons">
          menu
        </span>
      </button>
      <ul class="sm:flex sm:items-center sm:justify-center hidden
      sm:gap-5">
        <li>
          <span class="material-icons text-3xl cursor-pointer">
            home
          </span>
        </li>
        <li>
          <span class="material-icons text-3xl cursor-pointer">
            explore
          </span>
        </li>
        <li>
          <span class="material-icons text-3xl cursor-pointer">
            favorite_border
          </span>
        </li>
        <li class="inline-flex items-center justify-center cursor-pointer">
          <img class="w-[1.875rem] h-[1.875rem] rounded-full border-2 border-purple-900"
            src="https://i.pinimg.com/originals/ae/ec/c2/aeecc22a67dac7987a80ac0724658493.jpg" alt="User">
        </li>
      </ul>
    </nav>
    <div class="opacity-0 sm:hidden border-b-2 border-gray-700
    transition-all ease-in-out bg-blue-300" id="dropdown-content">
      <ul class="flex items-start justify-center sm:hidden
      gap-4 flex-col last:pb-3 first:pt-2 ml-2">
        <li class="relative flex justify-center items-center gap-5 after:absolute
        after:bg-gray-600 after:h-[1px] after:left-0 after:bottom-0
        after:ml-11 after:w-64 cursor-pointer">
          <span class="material-icons text-3xl cursor-pointer">
            home
          </span>
          Home
        </li>
        <li class="relative flex justify-center items-center gap-5 after:absolute
        after:bg-gray-600 after:h-[1px] after:left-0 after:bottom-0
        after:ml-11 after:w-64 cursor-pointer">
          <span class="material-icons text-3xl cursor-pointer">
            explore
          </span>
          Explore
        </li>
        <li class="relative flex justify-center items-center gap-5 after:absolute
        after:bg-gray-600 after:h-[1px] after:left-0 after:bottom-0
        after:ml-11 after:w-64 cursor-pointer">
          <span class="material-icons text-3xl cursor-pointer">
            favorite_border
          </span>
          Review this website
        </li>
        <li class="inline-flex items-center justify-center cursor-pointer gap-5">
          <img class="w-[1.875rem] h-[1.875rem] rounded-full border-2 border-purple-900"
            src="https://i.pinimg.com/originals/ae/ec/c2/aeecc22a67dac7987a80ac0724658493.jpg" alt="User">
          Your Profile
        </li>
      </ul>
    </div>
  </header>
  <main class="absolute h-[calc(100%-2.75rem)] w-full flex items-center justify-center">
    <h1 class="text-center text-red-700 text-3xl">
      Haha! Who's laughing now?
    </h1>
  </main>
  <script>
    const hamburger = document.getElementById('hamburger')
    const dropdownContent = document.getElementById('dropdown-content')
    let hamburgerState
    let ddContentHeight
    let mainTag = document.getElementsByTagName('main')[0]
    hamburger.addEventListener('click', () => {
      hamburgerState = hamburger.getAttribute('hamburgerState')
      if (hamburgerState === 'closed') {
        dropdownContent.classList.replace('opacity-0', 'opacity-100')
        hamburger.setAttribute('hamburgerState', 'opened')
      }
      else if (hamburgerState === 'opened') {
        dropdownContent.classList.replace('opacity-100', 'opacity-0')
        hamburger.setAttribute('hamburgerState', 'closed')
      } else {
        console.log('Invalid hamburger state.')
      }
    })
  </script>
</body>

</html>
